<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Formatter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Text Formatter</h1>

    <div class="header-bar">
        <p style="color:#aaa; text-align:center; font-size:13px;">
            Clean • Format • Fix text instantly
        </p>
    </div>

  <textarea id="inputText" placeholder="Paste or type your text here..."></textarea>

  <!-- CASE TOOLS -->
  <div class="tool-group">
    <h3>Case</h3>
    <button onclick="toUpper()">UPPERCASE</button>
    <button onclick="toLower()">lowercase</button>
    <button onclick="toTitle()">Title Case</button>
    <button onclick="toSentence()">Sentence case</button>
  </div>

  <!-- CLEANING TOOLS -->
  <div class="tool-group">
    <h3>Cleaning</h3>
    <button onclick="removeSpaces()">Remove Extra Spaces</button>
    <button onclick="removeBreaks()">Remove Line Breaks</button>
    <button onclick="removeDuplicates()">Remove Duplicate Lines</button>
    <button onclick="trimText()">Trim</button>
  </div>

  <!-- UTILITIES -->
  <div class="tool-group">
    <h3>Utilities</h3>
    <button onclick="undo()">Undo</button>
    <button onclick="resetText()">Reset</button>
    <button onclick="copyText()">Copy</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <span>Words: <b id="wordCount">0</b></span>
    <span>Characters: <b id="charCount">0</b></span>
    <span>Sentences: <b id="sentenceCount">0</b></span>
  </div>

  <p id="feedback"></p>
</div>

<script src="script.js"></script>
</body>
</html>
